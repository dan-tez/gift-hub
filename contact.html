<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luxe Gifts | Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo"><h1>Luxe<span>Gifts</span></h1></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>
   <div class="container">
    <div style="text-align: center;"><h2 class="section-title">Get In Touch</h2></div>
    <form class="form-card" onsubmit="handleContactSubmit(event)">
        <div class="form-group"><label>Name</label><input type="text" class="form-control" required></div>
        <div class="form-group"><label>Email</label><input type="email" class="form-control" required></div>
        <div class="form-group"><label>Message</label><textarea class="form-control" required rows="5"></textarea></div>
        <button type="submit" class="btn">Send Message</button>
    </form>
</div>
<div id="toast"></div>
</body>
</html>
