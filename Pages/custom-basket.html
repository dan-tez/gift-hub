<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luxe Gifts | Custom Basket</title>
    <link rel="stylesheet" href="./Css/styles.css">
</head>
<body>
    <header id="main-header"></header>

    <div class="container">
        <div style="text-align: center;"><h2 class="section-title">Design Your Basket</h2></div>
        
        <form class="form-card" id="basket-form">
            <div class="form-group">
                <label>Occasion</label>
                <select class="form-control">
                    <option>Birthday</option>
                    <option>Anniversary</option>
                    <option>Valentine's Day</option>
                </select>
            </div>
            <div class="form-group">
                <label>Select Items:</label>
                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                    <label><input type="checkbox" class="basket-item" value="1500" onchange="calculateBasket()"> Luxury Watch (+Ksh 1,500)</label>
                    <label><input type="checkbox" class="basket-item" value="1800" onchange="calculateBasket()"> Premium Perfume (+Ksh 1,800)</label>
                    <label><input type="checkbox" class="basket-item" value="800" onchange="calculateBasket()"> Leather Wallet (+Ksh 800)</label>
                </div>
            </div>
            <h3 style="text-align: right; margin-bottom: 20px;">Estimated Total: <span style="color: var(--accent-red);">Ksh <span id="basket-total">0</span></span></h3>
            <button type="button" class="btn" onclick="addBasketToCart()">Add Basket to Cart</button>
        </form>
    </div>
    <div id="toast"></div>
    <script src="../Js/script.js"></script>
</body>
</html>
