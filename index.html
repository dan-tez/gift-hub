<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Gifts | Store</title>
    <link rel="stylesheet" href="./Pages/Css/styles.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="hyper-ecommerce-body">
    
    <header id="main-header" class="site-header"></header>

    <main class="store-layout">
        <section class="promo-hero">
            <div class="promo-banner">
                <div class="promo-text">
                    <span class="badge">Weekend Offer</span>
                    <h2>Up to 20% off Premium Fragrances</h2>
                    <a href="#section-perfumes" class="shop-now-link">Shop Now <i class="fa-solid fa-chevron-right"></i></a>
                </div>
                <img src="https://images.unsplash.com/photo-1594035910387-fea47714263f?q=80&w=800" alt="Fragrances Promo">
            </div>
        </section>

        <nav class="quick-categories">
            <div class="qc-track">
                <a href="#section-watches" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?q=80&w=200" alt="Watches"></div>
                    <span>Watches</span>
                </a>
                <a href="#section-handbags" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1584916201218-f4242ceb4809?q=80&w=200" alt="Bags"></div>
                    <span>Bags</span>
                </a>
                <a href="#section-perfumes" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1588405748880-12d1d2a59f75?q=80&w=200" alt="Perfumes"></div>
                    <span>Perfumes</span>
                </a>
                <a href="Pages/custom-basket.html" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1549465220-1a8b9238cd48?q=80&w=200" alt="Custom"></div>
                    <span>Build Box</span>
                </a>
                <a href="#section-jewelry" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1599643478514-4a820cbf311e?q=80&w=200" alt="Jewelry"></div>
                    <span>Jewelry</span>
                </a>
                <a href="#section-sunglasses" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083?q=80&w=200" alt="Sunglasses"></div>
                    <span>Eyewear</span>
                </a>
            </div>
        </nav>

        <section class="mid-banner">
            <div class="mb-content">
                <h3>Build a Custom Gift Basket</h3>
                <p>Select your packaging, items, and a personalized card.</p>
            </div>
            <a href="Pages/custom-basket.html" class="mb-btn">Start Building</a>
        </section>

        <div id="storefront" class="dynamic-rows">
            </div>

    </main>

    <div id="toast"></div>

    <footer class="site-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Luxe Gifts. SSE 2210 Project.</p>
        </div>
    </footer>

    <script src="./Js/products.js"></script>
    <script src="./Js/script.js"></script>
</body>
</html>
