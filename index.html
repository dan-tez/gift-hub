<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Gifts | The Ultimate Gifting Hub</title>
    
    <link rel="stylesheet" href="./Pages/Css/styles.css"> 
    <link rel="stylesheet" href="./Pages/Header/header.css">
    <link rel="stylesheet" href="./Pages/Css/footer.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="hyper-ecommerce-body">
    
    <header id="main-header" class="site-header"></header>

    <main class="store-layout">
        
        <section class="promo-hero">
            <div class="promo-banner">
                <div class="promo-text">
                    <span class="badge">Luxe Gifts</span>
                    <h2>The All-In-One Gifting Destination</h2>
                    <p style="margin-bottom: 20px; color: rgba(255,255,255,0.8);">From luxury watches to tech products and custom packaging.</p>
                    <a href="#section-tech" class="shop-now-link">Browse Tech <i class="fa-solid fa-chevron-right"></i></a>
                </div>
                <img src="https://images.unsplash.com/photo-1549465220-1a8b9238cd48?q=80&w=800" alt="Luxe Gift Hub">
            </div>
        </section>

        <nav class="quick-categories">
            <div class="qc-track">
                <a href="#section-watches" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?q=80&w=200" alt="Watches"></div>
                    <span>Watches</span>
                </a>
                <a href="#section-jewelry" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1599643478514-4a820cbf311e?q=80&w=200" alt="Jewelry"></div>
                    <span>Jewelry</span>
                </a>
                <a href="#section-tech" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=200" alt="Tech"></div>
                    <span>Tech</span>
                </a>
                <a href="#section-home" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1603006375271-7f3b904bb167?q=80&w=200" alt="Home"></div>
                    <span>Home</span>
                </a>
                
                <a href="#section-flowers" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1582794543139-8ac9cb0f7b11?q=80&w=200" alt="Flowers"></div>
                    <span>Flowers</span>
                </a>
                <a href="#section-wellness" class="qc-item">
                    <div class="qc-img"><img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=200" alt="Wellness"></div>
                    <span>Wellness</span>
                </a>
                <a href="Pages/custom-basket.html" class="qc-item">
                    <div class="qc-img" style="background: var(--primary-yellow);"><img src="https://images.unsplash.com/photo-1513506451000-0e12902e35ca?q=80&w=200" alt="Custom"></div>
                    <span style="color: #000; font-weight: 800;">Build Box</span>
                </a>
            </div>
        </nav>

        <section class="mid-banner">
            <div class="mb-content">
                <h3>Bespoke Gift Builder</h3>
                <p>Add a signature box and a personalized foil-pressed card to any item.</p>
            </div>
            <a href="Pages/custom-basket.html" class="mb-btn">Start Building</a>
        </section>

        <div id="storefront" class="dynamic-rows"></div>

    </main>

    <div id="toast"></div>

    <footer id="main-footer"></footer>

    <script src="./Js/products.js"></script>
    <script src="./Js/script.js"></script>
</body>
</html>
