<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Gifts | The Ultimate Gifting Hub</title>
    
    <link rel="stylesheet" href="./Pages/Css/styles.css"> 
    <link rel="stylesheet" href="./Pages/Header/header.css">
    <link rel="stylesheet" href="./Pages/Css/footer.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="hyper-ecommerce-body">
    
    <header id="main-header" class="site-header"></header>

    <div class="store-layout">
        
        <section class="promo-hero">
            <div class="promo-banner">
                <div class="promo-text">
                    <span class="badge">Luxe Gifts</span>
                    <h2>The All-In-One Gifting Destination</h2>
                    <p style="margin-bottom: 20px; color: rgba(255,255,255,0.8);">From luxury watches to tech products and custom packaging.</p>
                    <a href="#section-tech" class="shop-now-link">Browse Tech <i class="fa-solid fa-chevron-right"></i></a>
                </div>
                <img src="Images/home-hero-image.jpeg" alt="Luxe Gift Hub">
            </div>
        </section>

        <nav class="quick-categories">
            <h3>Browse by category</h3>
            <br>
            <div class="qc-track">
                
                <a href="#section-watches" class="qc-item">
                    <div class="qc-img"><img src="Images/home-watches.jpeg" alt="Watches"></div>
                    <span>Watches</span>
                </a>
                <a href="#section-jewelry" class="qc-item">
                    <div class="qc-img"><img src="Images/home-jewelry.jpeg" alt="Jewelry"></div>
                    <span>Jewelry</span>
                </a>
                <a href="#section-tech" class="qc-item">
                    <div class="qc-img"><img src="Images/home-tech.jpeg" alt="Tech"></div>
                    <span>Tech</span>
                </a>
                <a href="#section-home" class="qc-item">
                    <div class="qc-img"><img src="Images/home-home.jpeg" alt="Home"></div>
                    <span>Home</span>
                </a>
                
                <a href="#section-flowers" class="qc-item">
                    <div class="qc-img"><img src="Images/home-flowers.jpeg" alt="Flowers"></div>
                    <span>Flowers</span>
                </a>
                <a href="#section-wellness" class="qc-item">
                    <div class="qc-img"><img src="Images/home-wellness.jpeg" alt="Wellness"></div>
                    <span>Wellness</span>
                </a>
                <a href="Pages/custom-basket.html" class="qc-item">
                    <div class="qc-img" style="background: var(--primary-yellow);"><img src="Images/Image_fx (2).png" alt="Custom"></div>
                    <span>Build Box</span>
                </a>
            </div>
        </nav>

        <div class="mid-banner">
            <div class="mb-content">
                <h3>Create a custom Gift Basket</h3>
                <p>Create a Custom box and a personalized card to any item.</p>
            </div>
            <a href="Pages/custom-basket.html" class="mb-btn">Start Building</a>
        </div>

        <div id="storefront" class="dynamic-rows"></div>

    </div>

    <div id="toast"></div>

    <footer id="main-footer"></footer>

    <script src="./Js/products.js"></script>
    <script src="./Js/script.js"></script>
</body>
</html>
